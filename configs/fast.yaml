runtime:
  device: cuda
  mixed_precision: true
  batch_size: 1024
  edge_backend: dexined
  edge_checkpoint: artifacts/models/edge/dexined.pt
  edge_fallback_backend: sobel
  glyph_mode: template
  char_model_path: None
  glyph_fallback_mode: None
  fallback_device: cpu
  charset: minimal
  smoothing: true
  background_suppression: true
  background_edge_threshold: 0.0
  background_variance_threshold: 0.0002
  background_confidence_margin: 0.05

render:
  columns: 96
  fps: 18.0
  overlay_mode: ascii_only

training:
  cell_width: 8
  cell_height: 12
  fonts:
    - DejaVuSansMono.ttf
