runtime:
  device: cuda
  mixed_precision: true
  batch_size: 1024
  edge_backend: dexined
  edge_checkpoint: artifacts/models/edge/dexined.pt
  glyph_mode: cnn
  char_model_path: artifacts/models/chars/char_cnn.pt
  fallback_device: cpu
  charset: minimal
  smoothing: true

render:
  columns: 96
  fps: 18.0
  overlay_mode: ascii_only

training:
  cell_width: 8
  cell_height: 12
  fonts:
    - DejaVuSansMono.ttf
