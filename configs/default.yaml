runtime:
  device: cuda
  mixed_precision: true
  batch_size: 512
  edge_backend: dexined
  edge_checkpoint: artifacts/models/edge/dexined.pt
  edge_fallback_backend: sobel
  glyph_mode: template
  char_model_path: None
  glyph_fallback_mode: None
  fallback_device: cpu
  charset: minimal
  smoothing: true
  background_suppression: false
  background_edge_threshold: 0.05
  background_variance_threshold: 0.08
  background_confidence_margin: 0.15

render:
  columns: 120
  fps: 24.0
  overlay_mode: ascii_only

training:
  cell_width: 8
  cell_height: 12
  fonts:
    - DejaVuSansMono.ttf
