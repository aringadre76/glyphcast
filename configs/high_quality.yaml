runtime:
  device: cuda
  mixed_precision: true
  batch_size: 256
  edge_backend: dexined
  edge_checkpoint: artifacts/models/edge/dexined.pt
  glyph_mode: cnn_plus_template
  char_model_path: artifacts/models/chars/char_cnn.pt
  fallback_device: cpu
  charset: dense
  smoothing: true

render:
  columns: 160
  fps: 24.0
  overlay_mode: blended

training:
  cell_width: 10
  cell_height: 16
  fonts:
    - DejaVuSansMono.ttf
