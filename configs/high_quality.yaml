runtime:
  device: cuda
  mixed_precision: true
  batch_size: 256
  edge_backend: dexined
  edge_checkpoint: artifacts/models/edge/dexined.pt
  edge_fallback_backend: sobel
  glyph_mode: cnn_plus_template
  char_model_path: artifacts/models/chars/char_cnn.pt
  glyph_fallback_mode: template
  fallback_device: cpu
  charset: dense
  smoothing: true
  background_suppression: false
  background_edge_threshold: 0.05
  background_variance_threshold: 0.08
  background_confidence_margin: 0.15

render:
  columns: 160
  fps: 24.0
  overlay_mode: blended

training:
  cell_width: 10
  cell_height: 16
  fonts:
    - DejaVuSansMono.ttf
